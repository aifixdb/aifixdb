services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://aifixdb:${POSTGRES_PASSWORD:-changeme}@db:5432/aifixdb
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - RATE_LIMIT_AUTH=${RATE_LIMIT_AUTH:-100}
      - RATE_LIMIT_ANON=${RATE_LIMIT_ANON:-30}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SENDER=${SMTP_SENDER:-noreply@nocodework.io}
      - PUBLIC_URL=${PUBLIC_URL:-https://aifixdb.nocodework.pl}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - coolify

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aifixdb
      POSTGRES_USER: aifixdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifixdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:

networks:
  internal:
  coolify:
    external: true
